<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Biome Outreach Tracker</title>

  <!-- Fonts: DM Sans (body/UI) + Fraunces (display headings ГўВЂВ” organic, premium) -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Tailwind Config -->
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            /* ГўВ”ВЂГўВ”ВЂ Forest palette ГўВЂВ” derived from canopy photograph ГўВ”ВЂГўВ”ВЂ */
            "forest":       "#14342a",   /* deep shadow green ГўВЂВ” headings, primary text */
            "forest-mid":   "#1e4d3a",   /* mid forest ГўВЂВ” hover states */
            "forest-light": "#2d6b4a",   /* lighter forest ГўВЂВ” secondary accents */
            "canopy":       "#3d8b63",   /* living canopy ГўВЂВ” primary accent */
            "canopy-dim":   "#2d7a52",   /* deeper canopy ГўВЂВ” hover */
            "canopy-light": "rgba(61,139,99,0.12)", /* canopy whisper */
            "meadow":       "rgba(61,139,99,0.08)", /* palest green tint */
            "meadow-mid":   "rgba(61,139,99,0.15)", /* subtle green */

            /* ГўВ”ВЂГўВ”ВЂ Mist & light tones ГўВЂВ” from the photo's atmosphere ГўВ”ВЂГўВ”ВЂ */
            "mist":         "#c8d8c4",   /* misty green-grey */
            "mist-light":   "#e0eadc",   /* lighter mist */
            "sunbeam":      "#a8b87a",   /* golden-green light hitting canopy */
            "dapple":       "#7a9e5a",   /* dappled sunlight through leaves */

            /* ГўВ”ВЂГўВ”ВЂ Category accents ГўВЂВ” born from the forest ГўВ”ВЂГўВ”ВЂ */
            "philanthropy": "#5a8a4a",   /* warm green ГўВЂВ” sunlit canopy */
            "investor":     "#2a6a5a",   /* cool teal ГўВЂВ” deep forest pools */
            "meeting":      "#8a7a3a",   /* golden amber ГўВЂВ” forest floor light */
            "urgent":       "#8a4a3a",   /* deep terracotta ГўВЂВ” autumn bark */

            /* ГўВ”ВЂГўВ”ВЂ Glass surfaces ГўВ”ВЂГўВ”ВЂ */
            "glass":        "rgba(255,255,255,0.78)",
            "glass-heavy":  "rgba(255,255,255,0.88)",
            "glass-light":  "rgba(255,255,255,0.60)",
            "glass-border": "rgba(255,255,255,0.45)",
            "glass-dark":   "rgba(20,52,42,0.85)",

            /* ГўВ”ВЂГўВ”ВЂ Neutral text on glass ГўВ”ВЂГўВ”ВЂ */
            "ink":          "#1a2a22",   /* near-black ГўВЂВ” forest-tinted */
            "ink-mid":      "#2d3d34",   /* body text */
            "ink-soft":     "#5a6a60",   /* secondary text */
            "ink-ghost":    "#8a9a8e",   /* placeholder/disabled */
            "border":       "rgba(20,52,42,0.10)",
            "border-soft":  "rgba(20,52,42,0.06)",

            /* ГўВ”ВЂГўВ”ВЂ Stage palette ГўВЂВ” psychologically distinct ГўВ”ВЂГўВ”ВЂ */
            "stage-warm":       "#b8860b",   /* warm amber/gold ГўВЂВ” Engaged */
            "stage-warm-bg":    "rgba(184,134,11,0.12)",
            "stage-active":     "#3d8b63",   /* canopy green ГўВЂВ” Contacted */
            "stage-active-bg":  "rgba(61,139,99,0.12)",
            "stage-pipeline":   "#6b7d8a",   /* cool mist/silver ГўВЂВ” New */
            "stage-pipeline-bg":"rgba(107,125,138,0.12)",
            "stage-hot":        "#b0603a",   /* rich copper/terracotta ГўВЂВ” Meeting/Proposal */
            "stage-hot-bg":     "rgba(176,96,58,0.12)",
            "stage-inactive":   "#6a7a72",   /* muted slate ГўВЂВ” Parked/Closed */
            "stage-inactive-bg":"rgba(106,122,114,0.12)",
            "stage-secured":    "#14342a",   /* deep forest ГўВЂВ” Secured */
            "stage-secured-bg": "rgba(20,52,42,0.12)",
            "stage-awaiting":   "#8a6a3a",   /* warm bronze ГўВЂВ” Awaiting Response */
            "stage-awaiting-bg":"rgba(138,106,58,0.12)",

            /* ГўВ”ВЂГўВ”ВЂ Semantic ГўВ”ВЂГўВ”ВЂ */
            "error":        "#8a3a3a",
            "error-bg":     "rgba(138,58,58,0.08)",
            "warning":      "#8a7a3a",
            "warning-bg":   "rgba(138,122,58,0.08)",
            "success":      "#3d8b63",

            /* ГўВ”ВЂГўВ”ВЂ Surface aliases for compatibility ГўВ”ВЂГўВ”ВЂ */
            "surface":      "transparent",
            "surface-low":  "rgba(255,255,255,0.40)",
            "surface-mid":  "rgba(255,255,255,0.55)",
            "surface-high": "rgba(255,255,255,0.30)",
            "surface-highest": "rgba(255,255,255,0.20)",

            /* ГўВ”ВЂГўВ”ВЂ Legacy aliases ГўВ”ВЂГўВ”ВЂ */
            "primary":      "#14342a",
            "on-primary":   "#ffffff",
            "on-surface":   "#1a2a22",
            "copper":       "#8a7a3a",
            "copper-light": "rgba(138,122,58,0.10)",
            "amber":        "#8a7a3a",
            "amber-light":  "rgba(138,122,58,0.08)",
            "terracotta":   "#8a4a3a",
          },
          fontFamily: {
            "headline": ["Fraunces", "Georgia", "serif"],
            "body":     ["DM Sans", "sans-serif"],
            "label":    ["DM Sans", "sans-serif"],
            "serif":    ["Fraunces", "Georgia", "serif"],
          },
          borderRadius: {
            "DEFAULT": "0.375rem",
            "sm":      "0.25rem",
            "md":      "0.5rem",
            "lg":      "0.75rem",
            "xl":      "1rem",
            "2xl":     "1.5rem",
            "full":    "9999px",
          },
          boxShadow: {
            "card":     "0 2px 8px rgba(20,52,42,0.06), 0 8px 32px rgba(20,52,42,0.08)",
            "card-hover": "0 4px 12px rgba(20,52,42,0.10), 0 16px 48px rgba(20,52,42,0.12)",
            "glass":    "0 4px 24px rgba(20,52,42,0.08), inset 0 1px 0 rgba(255,255,255,0.4)",
            "nav":      "0 2px 20px rgba(20,52,42,0.10)",
            "sm":       "0 1px 3px rgba(20,52,42,0.08)",
            "md":       "0 4px 16px rgba(20,52,42,0.10)",
            "lg":       "0 8px 32px rgba(20,52,42,0.14)",
          },
        },
      },
    }
  </script>

  <style>
    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    /* ГўВ”ВЂГўВ”ВЂ Full-bleed forest background ГўВ”ВЂГўВ”ВЂ */
    body {
      font-family: 'DM Sans', sans-serif;
      color: #1a2a22;
      min-height: 100vh;
      background: #14342a;
      background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?w=2400&q=85');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    /* Dark overlay to ensure readability ГўВЂВ” subtle, not heavy */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(20,52,42,0.30) 0%, rgba(20,52,42,0.20) 50%, rgba(20,52,42,0.35) 100%);
      pointer-events: none;
      z-index: 0;
    }

    #app { position: relative; z-index: 1; }

    h1, h2, h3, h4, .font-serif, .font-headline {
      font-family: 'Fraunces', Georgia, serif;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }

    /* ГўВ”ВЂГўВ”ВЂ Glassmorphism nav ГўВ”ВЂГўВ”ВЂ */
    .glass-nav {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border-bottom: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 2px 20px rgba(20,52,42,0.08);
    }

    /* ГўВ”ВЂГўВ”ВЂ Frosted glass card ГўВЂВ” the core component ГўВ”ВЂГўВ”ВЂ */
    .card {
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(28px) saturate(1.5);
      -webkit-backdrop-filter: blur(28px) saturate(1.5);
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 2px 8px rgba(20,52,42,0.06), 0 8px 32px rgba(20,52,42,0.08), inset 0 1px 0 rgba(255,255,255,0.7);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }
    .card:hover {
      box-shadow: 0 4px 12px rgba(20,52,42,0.10), 0 16px 48px rgba(20,52,42,0.12), inset 0 1px 0 rgba(255,255,255,0.8);
    }

    /* ГўВ”ВЂГўВ”ВЂ Heavy glass ГўВЂВ” for data-heavy cards (tables, forms) ГўВ”ВЂГўВ”ВЂ */
    .card-heavy {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(28px) saturate(1.5);
      -webkit-backdrop-filter: blur(28px) saturate(1.5);
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 2px 8px rgba(20,52,42,0.06), 0 8px 32px rgba(20,52,42,0.08), inset 0 1px 0 rgba(255,255,255,0.7);
    }

    /* ГўВ”ВЂГўВ”ВЂ Dark glass ГўВЂВ” for emphasis sections ГўВ”ВЂГўВ”ВЂ */
    .card-deep {
      background: rgba(20, 52, 42, 0.85);
      backdrop-filter: blur(20px) saturate(1.2);
      -webkit-backdrop-filter: blur(20px) saturate(1.2);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      color: #ffffff;
    }

    /* ГўВ”ВЂГўВ”ВЂ Warm glass ГўВЂВ” for philanthropy/financial sections ГўВ”ВЂГўВ”ВЂ */
    .card-warm {
      background: rgba(255, 252, 245, 0.96);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 2px 8px rgba(138,122,58,0.06), 0 8px 32px rgba(138,122,58,0.06), inset 0 1px 0 rgba(255,255,255,0.6);
    }

    /* ГўВ”ВЂГўВ”ВЂ Premium icon with forest background ГўВ”ВЂГўВ”ВЂ */
    .icon-forest {
      background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?w=400&q=80');
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
    }
    .icon-forest::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(20, 52, 42, 0.35);
    }
    .icon-forest > * {
      position: relative;
      z-index: 1;
    }

    /* ГўВ”ВЂГўВ”ВЂ Primary button ГўВ”ВЂГўВ”ВЂ */
    .btn-primary {
      background: rgba(20, 52, 42, 0.90);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.08);
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .btn-primary:hover {
      background: rgba(30, 77, 58, 0.95);
      box-shadow: 0 4px 20px rgba(61, 139, 99, 0.25);
    }
    .btn-primary:active { transform: scale(0.97); }

    /* ГўВ”ВЂГўВ”ВЂ Accent bar fill animation ГўВ”ВЂГўВ”ВЂ */
    .bar-fill { transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1); }

    /* ГўВ”ВЂГўВ”ВЂ Smooth page transitions ГўВ”ВЂГўВ”ВЂ */
    #app > div { animation: fadeUp 0.18s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ГўВ”ВЂГўВ”ВЂ Table row hover ГўВ”ВЂГўВ”ВЂ */
    tr.lead-row { transition: background 0.15s; }
    tr.lead-row:hover { background: rgba(255,255,255,0.4); }

    /* ГўВ”ВЂГўВ”ВЂ Priority dot pulse for Critical ГўВ”ВЂГўВ”ВЂ */
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .dot-critical { animation: pulse-dot 2s ease infinite; }

    /* ГўВ”ВЂГўВ”ВЂ Column pill ГўВ”ВЂГўВ”ВЂ */
    .col-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ГўВ”ВЂГўВ”ВЂ Priority glass tints ГўВЂВ” replace flat left borders ГўВ”ВЂГўВ”ВЂ */
    .priority-glass-high {
      background: rgba(255, 255, 255, 0.92) !important;
      backdrop-filter: blur(28px) saturate(1.5);
      -webkit-backdrop-filter: blur(28px) saturate(1.5);
      border: 1px solid rgba(138,58,58,0.14);
      border-left: 3px solid rgba(138,58,58,0.35);
      box-shadow: 0 2px 8px rgba(20,52,42,0.06), 0 8px 32px rgba(20,52,42,0.08), inset 0 1px 0 rgba(255,255,255,0.7);
    }
    .priority-glass-medium {
      background: rgba(255, 255, 255, 0.92) !important;
      backdrop-filter: blur(28px) saturate(1.5);
      -webkit-backdrop-filter: blur(28px) saturate(1.5);
      border: 1px solid rgba(184,134,11,0.12);
      border-left: 3px solid rgba(184,134,11,0.30);
      box-shadow: 0 2px 8px rgba(20,52,42,0.06), 0 8px 32px rgba(20,52,42,0.08), inset 0 1px 0 rgba(255,255,255,0.7);
    }
    .priority-glass-low {
      background: rgba(255, 255, 255, 0.92) !important;
      backdrop-filter: blur(28px) saturate(1.5);
      -webkit-backdrop-filter: blur(28px) saturate(1.5);
      border: 1px solid rgba(200,216,196,0.18);
      border-left: 3px solid rgba(200,216,196,0.45);
      box-shadow: 0 2px 8px rgba(20,52,42,0.06), 0 8px 32px rgba(20,52,42,0.08), inset 0 1px 0 rgba(255,255,255,0.7);
    }
    /* Darken body text inside priority glass cards so it reads clearly */
    .priority-glass-high p, .priority-glass-high span,
    .priority-glass-medium p, .priority-glass-medium span,
    .priority-glass-low p, .priority-glass-low span {
      text-shadow: 0 0 0 transparent; /* reset any inherited shadow */
    }
    .priority-glass-high .text-ink-soft,
    .priority-glass-medium .text-ink-soft,
    .priority-glass-low .text-ink-soft {
      color: #2d3d34 !important; /* ink-mid instead of ink-soft */
    }
    .priority-glass-high .text-ink-ghost,
    .priority-glass-medium .text-ink-ghost,
    .priority-glass-low .text-ink-ghost {
      color: #5a6a60 !important; /* ink-soft instead of ink-ghost */
    }

    /* ГўВ”ВЂГўВ”ВЂ SVG progress ring animation ГўВ”ВЂГўВ”ВЂ */
    .progress-ring-circle {
      transition: stroke-dashoffset 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }

    /* ГўВ”ВЂГўВ”ВЂ Mobile bottom nav glass ГўВ”ВЂГўВ”ВЂ */
    .nav-glass-bottom {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border-top: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 -4px 24px rgba(20,52,42,0.10);
    }

    /* Lens pill - global category filter in the header */
    .lens-pill {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 3px;
      background: rgba(20, 52, 42, 0.06);
      border: 1px solid rgba(20, 52, 42, 0.10);
      border-radius: 999px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .lens-segment {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: rgba(45, 61, 52, 0.65);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, transform 0.12s ease;
      white-space: nowrap;
    }
    .lens-segment:hover {
      color: #14342a;
      background: rgba(255, 255, 255, 0.55);
    }
    .lens-segment.is-active {
      color: #ffffff;
      background: rgba(20, 52, 42, 0.92);
      box-shadow: 0 1px 3px rgba(20, 52, 42, 0.18), 0 0 0 1px rgba(255,255,255,0.15) inset;
    }
    .lens-segment.is-active:hover {
      background: rgba(30, 77, 58, 0.95);
    }

    /* On Pause page segment buttons */
    .paused-segment {
      color: rgba(45, 61, 52, 0.65);
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(20, 52, 42, 0.06);
      transition: color 0.18s, background 0.18s, border 0.18s, box-shadow 0.18s;
      cursor: pointer;
    }
    .paused-segment:hover {
      color: #14342a;
      background: rgba(255, 255, 255, 0.75);
      border-color: rgba(20, 52, 42, 0.12);
    }
    .paused-segment.is-active {
      color: #ffffff;
      background: rgba(20, 52, 42, 0.92);
      border-color: rgba(20, 52, 42, 0.92);
      box-shadow: 0 2px 8px rgba(20, 52, 42, 0.12);
    }
  </style>
</head>
<body class="text-ink">
  <div id="app"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
